<!doctype html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Jędrzej Nowak (57796) - PTW LAB D</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <link rel="stylesheet" href="styles.css" type="text/css">
    <script src="scripts.js" defer></script>
</head>
<body>
<main class="app">
    <h1><i class="fa-solid fa-cloud-sun"></i> Pogoda</h1>
    <p class="subtitle">LAB D</p>

    <section class="search-section">
        <div class="search-bar">
            <i class="fa-solid fa-magnifying-glass search-icon"></i>
            <input type="text" id="address" placeholder="Wpisz miasto..." autocomplete="off">
            <button type="button" id="weatherBtn">
                <i class="fa-solid fa-location-dot"></i>
                Szukaj
            </button>
        </div>
        <ul id="suggestions" class="suggestions-list"></ul>
    </section>

    <section id="recentSection" class="recent-section" style="display:none;">
        <p class="recent-label"><i class="fa-solid fa-clock-rotate-left"></i> Ostatnio szukane:</p>
        <div id="recentCities" class="recent-chips"></div>
    </section>

    <section class="main-layout">
        <section class="panel">
            <div id="weatherResult"></div>
            <div id="forecastResult"></div>
        </section>
    </section>
</main>

</body>
</html>
