<!doctype html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Jędrzej Nowak (57796) - PTW LAB C</title>

    <link rel="stylesheet" href="leaflet/leaflet.css" type="text/css">
    <link rel="stylesheet" href="styles.css" type="text/css">
    <script src="leaflet/leaflet.js"></script>
    <script src="leaflet/leaflet-image.js"></script>
    <script src="scripts.js" defer></script>
</head>
<body>
    <main class="app">
        <h1>Mapa i puzzle</h1>
        <p class="subtitle">LAB C</p>

        <section class="buttons">
            <button type="button" id="notificationButton">Włącz powiadomienia</button>
            <button type="button" id="locationButton">Moja lokalizacja</button>
            <button type="button" id="downloadButton">Pobierz mapę</button>
        </section>

        <p id="status" class="status">Gotowe do pracy.</p>
        <p id="coords" class="coords">Współrzędne: brak</p>

        <div id="map"></div>

        <section class="panel">
            <h2>Raster mapy</h2>
            <div id="rasterPreview" class="raster-preview"></div>
        </section>

        <section class="panel">
            <h2>Rozsypane puzzle</h2>
            <div id="pieces" class="pieces"></div>
        </section>

        <section class="panel">
            <h2>Układanie puzzli</h2>
            <div id="board" class="board"></div>
        </section>
    </main>
</body>
</html>
